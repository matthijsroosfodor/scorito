name: Update WK-uitslagen

on:
  schedule:
    # Elk half uur, de hele dag. Snel en goedkoop: het script draait in seconden.
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-uitslagen
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Node installeren
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Uitslagen ophalen via API
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update_results.mjs

      - name: Commit & push als er iets is veranderd
        run: |
          if [ -n "$(git status --porcelain results.js)" ]; then
            git config user.name "scorito-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.js
            git commit -m "Uitslagen bijgewerkt ($(TZ=Europe/Amsterdam date '+%d-%m %H:%M'))"
            git push
          else
            echo "Geen nieuwe uitslagen — niets te pushen."
          fi
